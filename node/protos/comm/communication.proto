syntax = "proto3";

option go_package = "github.com/hyperledger/fabric-x-orderer/node/protos/comm";

package comm;

message SubmitResponse {
  string error = 1;
  bytes reqID = 2;
  bytes trace_id = 3;
}

message Request {
  bytes payload = 1;
  bytes signature = 2;
  bytes identity = 3;
  uint32 identity_id = 4;
  bytes trace_id = 5;
  uint32 config_seq = 6;
}

service RequestTransmit {
  rpc Submit(Request) returns (SubmitResponse);
  rpc SubmitStream(stream Request) returns (stream SubmitResponse);
}

message EventResponse {
  string error = 1;
}

message Event {
  bytes payload = 1;
}

service Consensus {
  rpc NotifyEvent(stream Event) returns (stream EventResponse);
  rpc SubmitConfig(Request) returns (SubmitResponse);
  rpc AckConfig(ConfigAck) returns (ConfigAckResponse);
}

message ConfigAck {
  // config_seq is the sequence number of the config block that was received
  uint32 config_seq = 1;
  
  // node_type identifies the type of node sending the acknowledgment
  NodeType node_type = 2;
  
  // shard is the shard of a batcher node
  // For assembler and router, this can be 0
  uint32 shard = 3;
}

message ConfigAckResponse {
  // error contains an error message if the acknowledgment was not accepted
  string error = 1;
}

enum NodeType {
  ASSEMBLER = 0;
  BATCHER = 1;
  ROUTER = 2;
}

message Ack {
  uint32 shard = 1;
  uint64 seq = 2;
}

message AckResponse {
  string error = 1;
}

message FwdRequest {
  bytes request = 1;
}

message FwdRequestResponse {
  string error = 1;
}

service BatcherControlService {
  rpc NotifyAck(stream Ack) returns (stream AckResponse);
  rpc FwdRequestStream(stream FwdRequest) returns (stream FwdRequestResponse);
}